server:
  port: 8888
  tomcat:
    connection-timeout: 2s
    keep-alive-timeout: 15s
    threads:
      max: 50
      min-spare: 5
  shutdown: graceful # 우아한 종료 활성화

spring:
  application:
    name: config-service
  lifecycle:
    timeout-per-shutdown-phase: 15s  # 15초의 종료 기간을 둔다.
  cloud:
    config:
      server:
        git:
          uri: https://github.com/kwonshzzang/config-repo.git
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true